name: crap
on:
  push:
    branches: [master]
  pull_request:

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short
      - run: ruff check src/ tests/

  crap:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install py-crap
        run: pip install -e .

      - name: version
        run: py-crap version

      - name: score
        run: py-crap scan --format github --fail-above --threshold 30 --exclude ".*_test\.py" --verbose

      - name: generate pr comment
        run: py-crap scan --format pr-comment --threshold 30 --exclude ".*_test\.py" --output pr-comment.md

      - name: save pr number
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: upload pr comment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crap-comment
          path: |
            pr-comment.md
            pr-number.txt
          if-no-files-found: ignore

      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execFileSync } = require('child_process');
            const comment = execFileSync('cat', ['pr-comment.md']).toString();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
